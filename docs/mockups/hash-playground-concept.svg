  <text x="1438" y="61" fill="#C0CAD8" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600">Avalanche</text>

  <rect x="70" y="134" width="298" height="872" rx="28" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
  <text x="102" y="180" fill="#F3F6FB" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Theory Panel</text>
  <text x="102" y="205" fill="#7C8BA1" font-family="Arial, Helvetica, sans-serif" font-size="13">Why tiny input changes explode into different outputs</text>

  <g>
    <rect x="94" y="248" width="250" height="88" rx="20" fill="#101827" stroke="#1E2B3D"/>
    <circle cx="122" cy="275" r="6" fill="#F7931A"/>
    <text x="140" y="280" fill="#EEF3FA" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Determinism</text>
    <text x="122" y="309" fill="#8FA0B9" font-family="Arial, Helvetica, sans-serif" font-size="13">Same input, same fingerprint.</text>
  </g>
  <g>
    <rect x="94" y="354" width="250" height="88" rx="20" fill="#101827" stroke="#1E2B3D"/>
    <circle cx="122" cy="381" r="6" fill="#36CFC9"/>
    <text x="140" y="386" fill="#EEF3FA" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Avalanche Effect</text>
    <text x="122" y="415" fill="#8FA0B9" font-family="Arial, Helvetica, sans-serif" font-size="13">One letter shifts the whole digest.</text>
  </g>
  <g>
    <rect x="94" y="460" width="250" height="88" rx="20" fill="#101827" stroke="#1E2B3D"/>
    <circle cx="122" cy="487" r="6" fill="#FF6B6B"/>
    <text x="140" y="492" fill="#EEF3FA" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Pre-image Resistance</text>
    <text x="122" y="521" fill="#8FA0B9" font-family="Arial, Helvetica, sans-serif" font-size="13">You can verify, not reverse.</text>
  </g>
  <g>
    <rect x="94" y="566" width="250" height="88" rx="20" fill="#101827" stroke="#1E2B3D"/>
    <circle cx="122" cy="593" r="6" fill="#FBBF24"/>
    <text x="140" y="598" fill="#EEF3FA" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Fixed Output Length</text>
    <text x="122" y="627" fill="#8FA0B9" font-family="Arial, Helvetica, sans-serif" font-size="13">Always 256 bits, always 64 hex chars.</text>
  </g>
  <g>
    <rect x="94" y="672" width="250" height="118" rx="20" fill="#171109" stroke="#4B3415"/>
    <text x="122" y="704" fill="#FDBA74" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="0.16em">WHY DOUBLE HASH?</text>
    <text x="122" y="734" fill="#F8E7D1" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Bitcoin often uses SHA-256d</text>
    <text x="122" y="761" fill="#C6A883" font-family="Arial, Helvetica, sans-serif" font-size="13">Second round hardens the result</text>
    <text x="122" y="781" fill="#C6A883" font-family="Arial, Helvetica, sans-serif" font-size="13">against length-extension quirks.</text>
  </g>

  <text x="410" y="182" fill="#F4F7FB" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">A cryptographic fingerprint lab</text>
  <text x="410" y="220" fill="#8FA0B9" font-family="Arial, Helvetica, sans-serif" font-size="20">Type anything on the left. Watch SHA-256 and SHA-256d materialize on the right in real time.</text>

