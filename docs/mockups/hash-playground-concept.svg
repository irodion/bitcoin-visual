  <rect width="1600" height="1080" fill="url(#amberGlow)"/>
  <rect width="1600" height="1080" fill="url(#cyanGlow)"/>

  <rect x="36" y="28" width="1528" height="1024" rx="34" fill="#0A0F18" stroke="rgba(255,255,255,0.08)" filter="url(#shadow)"/>

  <rect x="36" y="28" width="1528" height="78" rx="34" fill="#0D1420"/>
  <rect x="36" y="78" width="1528" height="1" fill="rgba(255,255,255,0.08)"/>
