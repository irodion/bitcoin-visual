  <text x="82" y="52" fill="#7F8DA3" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="0.2em">MODULE 1 / BITCOIN VISUAL</text>
  <text x="1260" y="53" fill="#8090A8" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="0.18em">LIVE UPDATE &lt;100MS</text>

  <rect x="1302" y="34" width="222" height="44" rx="22" fill="#101A28" stroke="rgba(255,255,255,0.08)"/>
