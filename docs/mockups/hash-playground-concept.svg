<svg width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07131B"/>
      <stop offset="0.5" stop-color="#0B101B"/>
      <stop offset="1" stop-color="#140F0A"/>
    </linearGradient>
    <radialGradient id="amberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1270 206) rotate(127.875) scale(492.434 549.581)">
      <stop stop-color="#F7931A" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#F7931A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(273 874) rotate(12.332) scale(524.221 278.198)">
      <stop stop-color="#2DD4BF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#121A28"/>
      <stop offset="1" stop-color="#0C1320"/>
    </linearGradient>
    <linearGradient id="panel2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#16110C"/>
      <stop offset="1" stop-color="#111A20"/>
    </linearGradient>
