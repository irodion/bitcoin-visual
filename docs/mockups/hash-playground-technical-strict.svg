<svg width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1600" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06090E"/>
      <stop offset="1" stop-color="#0A1118"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#9FB4CC" stroke-opacity="0.08"/>
    </pattern>
    <radialGradient id="trace" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1254 140) rotate(134.378) scale(433.755 330.678)">
      <stop stop-color="#38BDF8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow2" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1600" height="1080" fill="url(#bg2)"/>
