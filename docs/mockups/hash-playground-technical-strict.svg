  <text x="58" y="52" fill="#7690AA" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="0.2em">HASH MODULE / FORENSIC VIEW</text>
  <text x="58" y="73" fill="#E4EDF7" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Hash Playground</text>
  <text x="1218" y="52" fill="#7690AA" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="0.16em">SHA-256 PIPELINE STATUS: STABLE</text>

  <rect x="1330" y="36" width="200" height="36" rx="6" fill="#0B121A" stroke="#243548"/>
  <rect x="1334" y="40" width="96" height="28" rx="4" fill="#132336" stroke="#356189"/>
  <text x="1360" y="58" fill="#CDE7FF" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">NORMAL</text>
  <text x="1454" y="58" fill="#8096AD" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">AVALANCHE</text>

  <rect x="52" y="120" width="280" height="900" rx="10" fill="#0B121A" stroke="#223245"/>
  <text x="76" y="158" fill="#E4EDF7" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Theory Panel</text>
  <text x="76" y="182" fill="#7890A7" font-family="Arial, Helvetica, sans-serif" font-size="13">Reference notes pinned beside the instrument.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="76" y="220" width="232" height="92" rx="8" fill="#0E1721" stroke="#223245"/>
    <text x="92" y="246" fill="#5EC2FF" font-size="11" letter-spacing="0.18em">01</text>
    <text x="92" y="270" fill="#E4EDF7" font-size="16" font-weight="700">Determinism</text>
    <text x="92" y="295" fill="#7E96AE" font-size="13">No randomness. Equal input yields equal output.</text>

    <rect x="76" y="328" width="232" height="92" rx="8" fill="#0E1721" stroke="#223245"/>
    <text x="92" y="354" fill="#5EC2FF" font-size="11" letter-spacing="0.18em">02</text>
    <text x="92" y="378" fill="#E4EDF7" font-size="16" font-weight="700">Avalanche Effect</text>
    <text x="92" y="403" fill="#7E96AE" font-size="13">Small changes propagate through most bit positions.</text>

    <rect x="76" y="436" width="232" height="92" rx="8" fill="#0E1721" stroke="#223245"/>
    <text x="92" y="462" fill="#5EC2FF" font-size="11" letter-spacing="0.18em">03</text>
    <text x="92" y="486" fill="#E4EDF7" font-size="16" font-weight="700">Pre-image Resistance</text>
    <text x="92" y="511" fill="#7E96AE" font-size="13">Practical verification without feasible reversal.</text>

    <rect x="76" y="544" width="232" height="92" rx="8" fill="#0E1721" stroke="#223245"/>
    <text x="92" y="570" fill="#5EC2FF" font-size="11" letter-spacing="0.18em">04</text>
    <text x="92" y="594" fill="#E4EDF7" font-size="16" font-weight="700">Fixed Length</text>
    <text x="92" y="619" fill="#7E96AE" font-size="13">All outputs normalize to 256 bits.</text>

    <rect x="76" y="652" width="232" height="114" rx="8" fill="#10161D" stroke="#3A4F63"/>
    <text x="92" y="678" fill="#9BD7FF" font-size="11" letter-spacing="0.18em">05</text>
    <text x="92" y="702" fill="#E4EDF7" font-size="16" font-weight="700">SHA-256d Rationale</text>
    <text x="92" y="727" fill="#7E96AE" font-size="13">Bitcoin often applies SHA-256 twice in</text>
    <text x="92" y="747" fill="#7E96AE" font-size="13">contexts like block headers and TXIDs.</text>
  </g>

  <text x="372" y="160" fill="#DCE8F4" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">Interactive SHA-256 instrument</text>
  <text x="372" y="191" fill="#7D92A8" font-family="Arial, Helvetica, sans-serif" font-size="16">Less playful, more analytical: an educational cryptography console for inspecting message digests.</text>

