  <text x="571" y="579" fill="#344154" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">15 bytes</text>
  <rect x="642" y="557" width="146" height="34" rx="17" fill="#EFE6D8"/>
  <text x="674" y="579" fill="#344154" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">UTF-8 encoded</text>

