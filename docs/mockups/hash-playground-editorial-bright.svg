  <text x="142" y="294" fill="#17202D" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Determinism</text>
  <text x="142" y="319" fill="#6D7A8F" font-family="Arial, Helvetica, sans-serif" font-size="13">A stable rule: same text, same output.</text>
  <text x="142" y="402" fill="#17202D" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Avalanche effect</text>
  <text x="142" y="427" fill="#6D7A8F" font-family="Arial, Helvetica, sans-serif" font-size="13">A tiny edit can scramble most bits.</text>
  <text x="142" y="510" fill="#17202D" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Pre-image resistance</text>
  <text x="142" y="535" fill="#6D7A8F" font-family="Arial, Helvetica, sans-serif" font-size="13">Verification is easy; reversing is not.</text>
  <text x="142" y="618" fill="#17202D" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Fixed output length</text>
  <text x="142" y="643" fill="#6D7A8F" font-family="Arial, Helvetica, sans-serif" font-size="13">Always 64 hex characters for SHA-256.</text>
  <text x="142" y="726" fill="#17202D" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Why SHA-256d?</text>
  <text x="142" y="751" fill="#6D7A8F" font-family="Arial, Helvetica, sans-serif" font-size="13">Bitcoin often hashes twice for key structures.</text>

  <text x="406" y="186" fill="#18212F" font-family="Georgia, Times New Roman, serif" font-size="56" font-weight="700">The fingerprint of a message</text>
  <text x="410" y="227" fill="#5D6C80" font-family="Arial, Helvetica, sans-serif" font-size="22">An editorial, easy-to-read interpretation of the Hash Playground from the PRD.</text>

  <rect x="410" y="280" width="522" height="340" rx="32" fill="#FFF8EF" stroke="#E9DCCB"/>
  <text x="448" y="326" fill="#17202D" font-family="Georgia, Times New Roman, serif" font-size="28" font-weight="700">Input</text>
  <text x="448" y="354" fill="#6D7A8F" font-family="Arial, Helvetica, sans-serif" font-size="14">Single text input with live updates and visible character count.</text>
  <rect x="448" y="388" width="446" height="148" rx="24" fill="#FFFCF8" stroke="#DCCFBD"/>
  <text x="480" y="444" fill="#192638" font-family="Courier New, monospace" font-size="30">Hello, Bitcoin!</text>
  <text x="480" y="482" fill="#7B8799" font-family="Courier New, monospace" font-size="16">Every keystroke updates both hashes below.</text>
  <rect x="448" y="557" width="88" height="34" rx="17" fill="#EFE6D8"/>
  <text x="473" y="579" fill="#344154" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">15 chars</text>
